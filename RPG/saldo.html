<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saldo - Recife Point Game</title>
    <link rel="stylesheet" href="/src/css/saldo.css" />
  </head>
  <body>
    <div id="saldo">
      <div class="saldo-container">
        <h1>Ranking de Capibas</h1>
        
        <div class="carrossel-container">
          <div class="carrossel">
            <div class="pessoa">
              <p class="nome">Maria Silva</p>
              <p class="saldo">1º Lugar</p>
              <p class="pontos">250 capibas</p>
            </div>
            <div class="pessoa">
              <p class="nome">João Santos</p>
              <p class="saldo">2º Lugar</p>
              <p class="pontos">180 capibas</p>
            </div>
            <div class="pessoa">
              <p class="nome">Ana Oliveira</p>
              <p class="saldo">3º Lugar</p>
              <p class="pontos">150 capibas</p>
            </div>
            <div class="pessoa">
              <p class="nome">Pedro Costa</p>
              <p class="saldo">4º Lugar</p>
              <p class="pontos">120 capibas</p>
            </div>
          </div>
          <button class="prev" onclick="mudarSlide(-1)">&#10094;</button>
          <button class="next" onclick="mudarSlide(1)">&#10095;</button>
        </div>
        
        <div class="info-pessoal">
          <div class="saldo-pessoal">
            <span class="meu-saldo">Meu Saldo</span>
            <span class="meus-capibas">120 Capibas</span>
          </div>
          <div class="historico">
            <span class="operacao">Recebeu</span>
            <span class="valor">75 Capibas</span>
          </div>
          <div class="historico">
            <span class="operacao">Recebeu</span>
            <span class="valor">20 Capibas</span>
          </div>
          <div class="historico">
            <span class="operacao">Recebeu</span>
            <span class="valor">35 Capibas</span>
          </div>
        </div>
      </div>
    </div>

    <script src="./src/components/barra-superior/barra-superior-loader.js"></script>
    <script>
      // Lógica do carrossel
      let slideIndex = 0;
      let autoRotate;
      
      function mudarSlide(n) {
        const slides = document.querySelectorAll('.pessoa');
        slideIndex += n;
        
        if (slideIndex >= slides.length) slideIndex = 0;
        if (slideIndex < 0) slideIndex = slides.length - 1;
        
        const carrossel = document.querySelector('.carrossel');
        carrossel.style.transform = `translateX(-${slideIndex * 100}%)`;
        
        // Reiniciar auto-rotate
        clearInterval(autoRotate);
        iniciarAutoRotate();
      }

      function iniciarAutoRotate() {
        autoRotate = setInterval(() => {
          mudarSlide(1);
        }, 5000);
      }

      // Iniciar auto-rotate quando a página carregar
      document.addEventListener('DOMContentLoaded', function() {
        iniciarAutoRotate();
        
        // Configurar eventos da navbar
        const links = document.querySelectorAll('.barra-superior .meio a');
        links.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = link.getAttribute('href');
          });
        });

        // Logo clicável
        document.querySelector('.logo-img').addEventListener('click', () => {
          window.location.href = 'index.html';
        });
      });

      // Pausar auto-rotate quando o mouse estiver sobre o carrossel
      document.querySelector('.carrossel-container').addEventListener('mouseenter', () => {
        clearInterval(autoRotate);
      });

      // Retomar auto-rotate quando o mouse sair do carrossel
      document.querySelector('.carrossel-container').addEventListener('mouseleave', () => {
        iniciarAutoRotate();
      });
    </script>
  </body>
</html>
