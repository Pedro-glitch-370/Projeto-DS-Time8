<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Recife Point Game</title>
    <link rel="stylesheet" href="./src/css/login.css">
</head>
<body>
    <div class="pagina">
        <img src="/src/assets/LogoConecta.png" alt="Recife Point Game">
        <h1>Entrar</h1>
        <div class="login-container">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                
                <button type="submit">Entrar</button>
            </form>

            <a href="register.html" class="register-link">Não tem conta? Registre-se</a>
            <a href="index.html" class="back-to-map">← Voltar ao Mapa</a>
            
            <div class="error" id="errorMessage"></div>
            <div class="loading" id="loading">Entrando...</div>
        </div>
    </div>
    

    <script>
    // Elementos da UI
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const loading = document.getElementById('loading');

    // Configuração da API
    const API_BASE_URL = 'http://localhost:5001/api';

    // Função para verificar se o servidor está online
    async function checkServerStatus() {
        try {
            const response = await fetch(`${API_BASE_URL}/pinos`);
            return response.ok;
        } catch (error) {
            return false;
        }
    }

    // Login - apenas com email
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        
        // Validação básica
        if (!email) {
            showError('Por favor, informe seu email');
            return;
        }

        // Mostrar loading
        loading.style.display = 'block';
        errorMessage.style.display = 'none';

        try {
            // Tenta primeiro como admin, depois como cliente
            let response = await fetch(`${API_BASE_URL}/auth/admins/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email })
            });
            
            if (response.status === 404 || !response.ok) {
                // Se não for admin, tenta como cliente
                response = await fetch(`${API_BASE_URL}/auth/clientes/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });
            }
            
            const data = await response.json();
            
            if (response.ok) {
                // Login bem-sucedido
                localStorage.setItem('user', JSON.stringify(data.user || data));
                window.location.href = 'index.html';
            } else {
                throw new Error(data.message || 'Email não encontrado');
            }
            
        } catch (error) {
            console.error('Erro no login:', error);
            if (error.message.includes('Failed to fetch')) {
                showError('Servidor offline. Verifique se o backend está rodando na porta 5001.');
            } else {
                showError(error.message || 'Erro ao fazer login. Tente novamente.');
            }
        } finally {
            loading.style.display = 'none';
        }
    });

    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
    }
</script>
</body>
</html>
