<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Recife Point Game</title>
    <link rel="stylesheet" href="./src/css/register.css">
</head>
<body>
    <div class="pagina">
        <img src="/src/assets/LogoConecta.png" alt="Recife Point Game">
        <h1>Criar Conta</h1>
        <div class="register-container">           
            <form id="registerForm">
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Tipo de usuário *</label>
                    <div class="user-type">
                        <label>
                            <input type="radio" name="tipo" value="cliente" checked>
                            <span>Cliente</span>
                        </label>
                        <label>
                            <input type="radio" name="tipo" value="admin">
                            <span>Admin</span>
                        </label>
                    </div>
                </div>
                
                <button type="submit">Registrar</button>
            </form>

            <a href="login.html" class="login-link">Já tem uma conta? Faça login</a>
            <a href="index.html" class="back-to-map">← Voltar ao Mapa</a>
            
            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>
            <div class="loading" id="loading">Registrando...</div>
        </div>
    </div>

    <script>
        // Elementos da UI
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');

        // Configuração da API
        const API_BASE_URL = 'http://localhost:5001/api';

        // Função para mostrar erros
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        // Função para mostrar sucesso
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        // REGISTRO - código correto para registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            
            // Validações
            if (!nome || !email) {
                showError('Por favor, preencha todos os campos');
                return;
            }

            // Mostrar loading
            loading.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                console.log("📝 Iniciando registro:", { nome, email, tipo });

                // Escolhe a rota baseada no tipo de usuário
                const rota = tipo === 'admin' ? '/auth/admins/register' : '/auth/clientes/register';
                
                const response = await fetch(`${API_BASE_URL}${rota}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        nome,
                        email
                    })
                });

                console.log("📡 Resposta do servidor:", response.status);

                // Verifica se a resposta é JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    console.error("❌ Resposta não é JSON:", text);
                    throw new Error('Resposta inválida do servidor');
                }

                const data = await response.json();
                console.log("📊 Dados recebidos:", data);
                
                if (response.ok) {
                    showSuccess('Registro realizado com sucesso! Redirecionando para login...');
                    console.log("✅ Registro bem-sucedido");
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || `Erro no registro: ${response.status}`);
                }
                
            } catch (error) {
                console.error('❌ ERRO no registro:', error);
                
                if (error.message.includes('Failed to fetch')) {
                    showError('Não foi possível conectar ao servidor. Verifique se o backend está rodando na porta 5001.');
                } else if (error.message.includes('JSON')) {
                    showError('Erro no servidor. A rota de registro pode não existir.');
                } else {
                    showError(error.message);
                }
            } finally {
                loading.style.display = 'none';
            }
        });

    </script>
</body>
</html>
